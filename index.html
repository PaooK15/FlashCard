<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GA_CARD - Học Tiếng Anh</title>
    
    <!-- 1. Nhúng Tailwind CSS để tạo giao diện -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 2. Nhúng React và ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- 3. Nhúng Babel để trình duyệt hiểu được mã JSX của React -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        /* Hiệu ứng lật thẻ 3D */
        .perspective-1000 { perspective: 1000px; }
        .transform-style-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        .flip-card-inner { transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1); }
        .animate-fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen">
    
    <!-- Nơi chứa toàn bộ ứng dụng -->
    <div id="root"></div>

    <!-- Mã React viết bên trong thẻ script type="text/babel" -->
    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        // --- Các Icon bằng SVG (thay thế cho thư viện bên ngoài để chạy mượt Offline) ---
        const IconPlay = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>;
        const IconTrash = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>;
        const IconPlus = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>;
        const IconBookOpen = () => <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>;
        const IconRotate = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>;
        const IconChevronLeft = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>;
        const IconArrowLeft = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>;
        const IconArrowRight = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>;

        // --- Thành phần Chính (App) ---
        function App() {
            const [view, setView] = useState('dashboard');
            const [flashcards, setFlashcards] = useState([]);
            const [activeStudyList, setActiveStudyList] = useState([]);
            const [errorMessage, setErrorMessage] = useState('');
            const [isLoaded, setIsLoaded] = useState(false);

            // Tải dữ liệu từ LocalStorage khi mở app
            useEffect(() => {
                const savedData = localStorage.getItem('gacard_offline_data');
                if (savedData) {
                    try {
                        setFlashcards(JSON.parse(savedData));
                    } catch(e) {
                        console.error("Lỗi đọc dữ liệu");
                    }
                }
                setIsLoaded(true);
            }, []);

            // Lưu dữ liệu vào LocalStorage mỗi khi có thay đổi
            useEffect(() => {
                if (isLoaded) {
                    localStorage.setItem('gacard_offline_data', JSON.stringify(flashcards));
                }
            }, [flashcards, isLoaded]);

            const showError = (msg) => {
                setErrorMessage(msg);
                setTimeout(() => setErrorMessage(''), 3000);
            };

            if (!isLoaded) return null;

            return (
                <div>
                    {/* Thanh Điều Hướng */}
                    <nav className="bg-white shadow-sm px-4 py-3 sticky top-0 z-10">
                        <div className="max-w-4xl mx-auto flex justify-between items-center">
                            <div 
                                className="flex items-center space-x-2 text-indigo-600 font-bold text-xl cursor-pointer" 
                                onClick={() => setView('dashboard')}
                            >
                                <span className="text-2xl" role="img" aria-label="chicken logo">🐔</span>
                                <span>GA_CARD</span>
                            </div>
                            <div className="text-xs sm:text-sm text-slate-500 bg-slate-100 px-3 py-1.5 rounded-full font-medium">
                                Chế độ Offline (Lưu tại máy)
                            </div>
                        </div>
                    </nav>

                    {/* Thông báo lỗi */}
                    {errorMessage && (
                        <div className="fixed top-20 left-1/2 transform -translate-x-1/2 bg-red-500 text-white px-6 py-3 rounded-lg shadow-lg z-50">
                            {errorMessage}
                        </div>
                    )}

                    <main className="max-w-4xl mx-auto p-4 sm:p-6 md:p-8">
                        {view === 'dashboard' && (
                            <Dashboard 
                                flashcards={flashcards} 
                                setFlashcards={setFlashcards}
                                onStudy={(list) => {
                                    setActiveStudyList(list);
                                    setView('study');
                                }} 
                                onError={showError} 
                            />
                        )}
                        
                        {view === 'study' && (
                            <StudyScreen 
                                flashcards={activeStudyList} 
                                onBack={() => setView('dashboard')} 
                            />
                        )}
                    </main>
                </div>
            );
        }

        // --- Màn hình Dashboard ---
        function Dashboard({ flashcards, setFlashcards, onStudy, onError }) {
            const [engWord, setEngWord] = useState('');
            const [viMeaning, setViMeaning] = useState('');
            const [selectedCardIds, setSelectedCardIds] = useState([]);

            const handleAdd = (e) => {
                e.preventDefault();
                if (!engWord.trim() || !viMeaning.trim()) {
                    onError("Vui lòng điền cả từ tiếng Anh và nghĩa tiếng Việt.");
                    return;
                }
                const newCard = {
                    id: Date.now().toString(), // Tạo ID ngẫu nhiên bằng thời gian
                    english: engWord.trim(),
                    vietnamese: viMeaning.trim(),
                    createdAt: Date.now()
                };
                setFlashcards([newCard, ...flashcards]);
                setEngWord('');
                setViMeaning('');
            };

            const handleDelete = (id) => {
                setFlashcards(flashcards.filter(c => c.id !== id));
                setSelectedCardIds(prev => prev.filter(cardId => cardId !== id));
            };

            const toggleSelection = (id) => {
                setSelectedCardIds(prev => 
                    prev.includes(id) ? prev.filter(cardId => cardId !== id) : [...prev, id]
                );
            };

            const handleStartStudy = () => {
                if (selectedCardIds.length > 0) {
                    onStudy(flashcards.filter(c => selectedCardIds.includes(c.id)));
                } else {
                    onStudy(flashcards);
                }
            };

            return (
                <div className="space-y-8 animate-fade-in">
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                        <div>
                            <h1 className="text-2xl font-bold text-slate-800">Kho từ vựng của bạn</h1>
                            <p className="text-slate-500 mt-1">
                                Đang có <span className="font-semibold text-indigo-600">{flashcards.length}</span> thẻ flashcard
                            </p>
                        </div>
                        <button 
                            onClick={handleStartStudy}
                            disabled={flashcards.length === 0}
                            className="mt-4 md:mt-0 flex items-center space-x-2 bg-green-500 hover:bg-green-600 text-white px-6 py-3 rounded-xl font-medium transition disabled:opacity-50 disabled:cursor-not-allowed shadow-sm hover:shadow-md"
                        >
                            <IconPlay />
                            <span>{selectedCardIds.length > 0 ? `Học ${selectedCardIds.length} từ đã chọn` : 'Học tất cả'}</span>
                        </button>
                    </div>

                    <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                        <h2 className="text-lg font-semibold text-slate-800 mb-4 flex items-center">
                            <span className="mr-2 text-indigo-500"><IconPlus /></span>
                            Thêm thẻ mới
                        </h2>
                        <form onSubmit={handleAdd} className="flex flex-col sm:flex-row gap-4">
                            <input 
                                type="text" 
                                placeholder="Từ tiếng Anh (VD: Apple)"
                                className="flex-1 px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition bg-slate-50 focus:bg-white text-lg"
                                value={engWord}
                                onChange={(e) => setEngWord(e.target.value)}
                            />
                            <input 
                                type="text" 
                                placeholder="Nghĩa tiếng Việt (VD: Quả táo)"
                                className="flex-1 px-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none transition bg-slate-50 focus:bg-white text-lg"
                                value={viMeaning}
                                onChange={(e) => setViMeaning(e.target.value)}
                            />
                            <button 
                                type="submit"
                                disabled={!engWord.trim() || !viMeaning.trim()}
                                className="bg-indigo-600 hover:bg-indigo-700 text-white px-8 py-3 rounded-xl font-medium transition disabled:opacity-50 flex items-center justify-center"
                            >
                                Thêm
                            </button>
                        </form>
                    </div>

                    <div>
                        <div className="flex justify-between items-center mb-4 px-2">
                            <h2 className="text-lg font-semibold text-slate-800">Danh sách từ đã thêm</h2>
                            {flashcards.length > 0 && (
                                <button 
                                    onClick={() => setSelectedCardIds(selectedCardIds.length === flashcards.length ? [] : flashcards.map(c => c.id))}
                                    className="text-sm text-indigo-600 hover:text-indigo-800 font-medium transition"
                                >
                                    {selectedCardIds.length === flashcards.length ? 'Bỏ chọn tất cả' : 'Chọn tất cả'}
                                </button>
                            )}
                        </div>
                        
                        {flashcards.length === 0 ? (
                            <div className="text-center py-12 bg-white rounded-2xl border border-slate-100 border-dashed">
                                <div className="flex justify-center text-slate-300 mb-3"><IconBookOpen /></div>
                                <p className="text-slate-500">Chưa có flashcard nào. Hãy thêm từ mới ở trên!</p>
                            </div>
                        ) : (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                {flashcards.map((card) => (
                                    <div 
                                        key={card.id} 
                                        onClick={() => toggleSelection(card.id)}
                                        className={`bg-white p-5 rounded-xl shadow-sm border flex justify-between items-start group transition cursor-pointer ${
                                            selectedCardIds.includes(card.id) ? 'border-indigo-500 ring-1 ring-indigo-500 bg-indigo-50/50' : 'border-slate-100 hover:border-indigo-200'
                                        }`}
                                    >
                                        <div className="flex items-start gap-3">
                                            <input 
                                                type="checkbox"
                                                checked={selectedCardIds.includes(card.id)}
                                                readOnly
                                                className="mt-1 w-4 h-4 text-indigo-600 rounded border-slate-300 pointer-events-none"
                                            />
                                            <div>
                                                <h3 className="font-bold text-lg text-slate-800">{card.english}</h3>
                                                <p className="text-slate-600 mt-1">{card.vietnamese}</p>
                                            </div>
                                        </div>
                                        <button 
                                            onClick={(e) => {
                                                e.stopPropagation();
                                                handleDelete(card.id);
                                            }}
                                            className="text-slate-300 hover:text-red-500 p-2 rounded-lg hover:bg-red-50 opacity-0 group-hover:opacity-100 transition focus:opacity-100"
                                            title="Xóa thẻ này"
                                        >
                                            <IconTrash />
                                        </button>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // --- Màn hình Học ---
        function StudyScreen({ flashcards, onBack }) {
            const [currentIndex, setCurrentIndex] = useState(0);
            const [isFlipped, setIsFlipped] = useState(false);
            const [studyList, setStudyList] = useState([]);

            useEffect(() => {
                setStudyList([...flashcards].sort(() => 0.5 - Math.random()));
                setCurrentIndex(0);
                setIsFlipped(false);
            }, [flashcards]);

            const nextCard = useCallback(() => {
                if (currentIndex < studyList.length - 1) {
                    setIsFlipped(false);
                    setTimeout(() => setCurrentIndex(prev => prev + 1), 150);
                }
            }, [currentIndex, studyList.length]);

            const prevCard = useCallback(() => {
                if (currentIndex > 0) {
                    setIsFlipped(false);
                    setTimeout(() => setCurrentIndex(prev => prev - 1), 150);
                }
            }, [currentIndex]);

            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (e.key === 'ArrowRight') nextCard();
                    else if (e.key === 'ArrowLeft') prevCard();
                    else if (e.key === ' ' || e.key === 'Spacebar') {
                        e.preventDefault();
                        setIsFlipped(prev => !prev);
                    }
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [nextCard, prevCard]);

            if (studyList.length === 0) return null;

            const currentCard = studyList[currentIndex];
            const progress = ((currentIndex + 1) / studyList.length) * 100;

            return (
                <div className="max-w-2xl mx-auto flex flex-col items-center animate-fade-in pt-4">
                    <div className="w-full flex justify-between items-center mb-8">
                        <button 
                            onClick={onBack}
                            className="flex items-center text-slate-500 hover:text-slate-800 transition px-3 py-2 rounded-lg hover:bg-slate-100"
                        >
                            <IconChevronLeft />
                            <span className="ml-1">Trở về</span>
                        </button>
                        <div className="text-slate-500 font-medium bg-white px-4 py-1.5 rounded-full shadow-sm border border-slate-100">
                            Thẻ {currentIndex + 1} / {studyList.length}
                        </div>
                    </div>

                    <div className="w-full h-2 bg-slate-200 rounded-full mb-10 overflow-hidden">
                        <div 
                            className="h-full bg-indigo-500 transition-all duration-300 ease-out"
                            style={{ width: `${progress}%` }}
                        ></div>
                    </div>

                    <div 
                        className="relative w-full aspect-[4/3] max-h-[400px] perspective-1000 cursor-pointer"
                        onClick={() => setIsFlipped(!isFlipped)}
                    >
                        <div className={`w-full h-full absolute transform-style-3d flip-card-inner rounded-3xl shadow-xl ${isFlipped ? 'rotate-y-180' : ''}`}>
                            {/* Mặt trước */}
                            <div className="absolute w-full h-full backface-hidden bg-white border-2 border-slate-100 rounded-3xl flex flex-col items-center justify-center p-8">
                                <span className="text-slate-400 font-medium uppercase tracking-widest text-sm mb-6 absolute top-6">Tiếng Anh</span>
                                <h2 className="text-5xl md:text-6xl font-bold text-slate-800 text-center break-words w-full">{currentCard?.english}</h2>
                                <div className="absolute bottom-6 flex flex-col items-center text-slate-400">
                                    <div className="mb-2 opacity-50"><IconRotate /></div>
                                    <span className="text-sm">Chạm để xem nghĩa</span>
                                </div>
                            </div>
                            {/* Mặt sau */}
                            <div className="absolute w-full h-full backface-hidden bg-indigo-600 rounded-3xl rotate-y-180 flex flex-col items-center justify-center p-8 text-white">
                                <span className="text-indigo-200 font-medium uppercase tracking-widest text-sm mb-6 absolute top-6">Nghĩa Tiếng Việt</span>
                                <h2 className="text-4xl md:text-5xl font-bold text-center break-words w-full leading-tight">{currentCard?.vietnamese}</h2>
                            </div>
                        </div>
                    </div>

                    <div className="flex items-center justify-center space-x-6 mt-12 w-full">
                        <button 
                            onClick={(e) => { e.stopPropagation(); prevCard(); }}
                            disabled={currentIndex === 0}
                            className="p-4 rounded-full bg-white shadow-sm border border-slate-100 text-slate-600 hover:text-indigo-600 hover:bg-indigo-50 transition disabled:opacity-30 disabled:cursor-not-allowed"
                        >
                            <IconArrowLeft />
                        </button>
                        
                        <div className="text-sm text-slate-400 flex flex-col items-center px-4">
                            <span>Dùng phím mũi tên ⬅️ ➡️</span>
                            <span>Phím Space để lật</span>
                        </div>

                        <button 
                            onClick={(e) => { e.stopPropagation(); nextCard(); }}
                            disabled={currentIndex === studyList.length - 1}
                            className="p-4 rounded-full bg-white shadow-sm border border-slate-100 text-slate-600 hover:text-indigo-600 hover:bg-indigo-50 transition disabled:opacity-30 disabled:cursor-not-allowed"
                        >
                            <IconArrowRight />
                        </button>
                    </div>
                    
                    {currentIndex === studyList.length - 1 && studyList.length > 0 && (
                        <div className="mt-8 text-green-600 font-medium flex items-center bg-green-50 px-6 py-3 rounded-full">
                            🎉 Bạn đã ôn tập xong danh sách!
                        </div>
                    )}
                </div>
            );
        }

        // Render ứng dụng vào thẻ div có id="root"
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
